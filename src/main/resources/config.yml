# =============================================
#              SwitchSkin Configuration
# =============================================
# Supports MiniMessage format for all text fields.

config-version: 1

# Language file to use from the lang/ folder (without .yml)
# Available: en_US, es_ES (or create your own)
lang: 'en_US'

defaults:
  # Maximum number of skin slots a single item can hold.
  max-slots: 6

# Per-feature switches for what a skin can override on the held item.
features:
  switch-name: true
  switch-lore: true

# Behaviour of the skin switch action (menu, /ss switch, etc.)
switch:
  # 'actionbar' shows the message above the hotbar.
  # 'chat' falls back to a regular chat message.
  feedback: 'actionbar'

  cooldown:
    enabled: true
    millis: 500

  sound:
    enabled: true
    key: 'minecraft:ui.button.click'
    volume: 1.0
    pitch: 1.2

# Skin selection menu (/ss menu).
# The layout uses single-character symbols. Each character maps to a role:
#   skin-slot.symbol      -> one slot per character; populated in order
#   vanilla-button.symbol -> reverts the held item to its original look
#   close-button.symbol   -> closes the menu
#   any other character   -> looked up in decorative-icons
menu:
  title: '<white><gradient:#B4E488:#7DD031><b>Switch Skin</b></gradient></white>'
  layout:
    - 'XXXXXXXXX'
    - 'XSSSSSSSX'
    - 'XVXXXXXCX'

  skin-slot:
    symbol: 'S'
    entry-active:
      material: 'NAME_TAG'
      custom_name: '<gradient:#B4E488:#7DD031><b>{skin}</b></gradient>'
      lore:
        - ''
        - ' <#B4E488>► Active skin</#B4E488> '
        - ''
    entry-inactive:
      material: 'NAME_TAG'
      custom_name: '<white>{skin}</white>'
      lore:
        - ''
        - ' <gray>Click to switch to this skin.</gray> '
        - ''

  vanilla-button:
    symbol: 'V'
    active:
      material: 'BARRIER'
      custom_name: '<red><b>Vanilla</b></red> <gray>(active)</gray>'
      lore:
        - ''
        - ' <gray>The original look is showing.</gray> '
        - ' <gray>Click any skin to reapply it.</gray> '
        - ''
    inactive:
      material: 'BARRIER'
      custom_name: '<red><b>Vanilla</b></red>'
      lore:
        - ''
        - ' <gray>Restore the original look</gray> '
        - ' <gray>without losing your tokens.</gray> '
        - ''

  close-button:
    symbol: 'C'
    material: 'OAK_DOOR'
    custom_name: '<red><b>Close</b></red>'
    lore:
      - ''
      - ' <gray>Closes this menu.</gray> '
      - ''

  decorative-icons:
    border:
      symbol: 'X'
      material: 'GRAY_STAINED_GLASS_PANE'
      custom_name: ' '

# Token item used to add a skin slot to a held item.
token:
  material: 'NAME_TAG'
  custom_name: '<gradient:#B4E488:#7DD031><b>Skin Slot Token</b></gradient> <gray>—</gray> <white>{skin}</white>'
  lore:
    - ''
    - ' <white>Right-click this token onto an</white> '
    - ' <white>item in your inventory to add</white> '
    - ' <white>the <#7DD031>{skin}</#7DD031> skin slot.</white> '
    - ''

# Tooltip token: applies a skin's tooltip_style without touching the slot row.
tooltip-token:
  material: 'PAPER'
  custom_name: '<gradient:#B4E488:#7DD031><b>Tooltip Token</b></gradient> <gray>—</gray> <white>{skin}</white>'
  lore:
    - ''
    - ' <white>Right-click this token onto an</white> '
    - ' <white>item in your inventory to apply</white> '
    - ' <white>the <#7DD031>{skin}</#7DD031> tooltip style.</white> '
    - ''
