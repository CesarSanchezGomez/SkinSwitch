# =============================================
#              SwitchSkin Configuration
# =============================================
# Supports MiniMessage format for all text fields.
#
# -- Data Components --------------------------
# Every menu icon (skin-slot, vanilla-button, close-button, prev-button,
# next-button, decorative-icons.*) AND every token (`token`,
# `tooltip-token` below) supports the following Minecraft data components
# on top of `material`:
#   custom_name                - Item name (MiniMessage)
#   lore                       - List of lines (MiniMessage)
#   profile                    - Head texture (textures: 'base64...') or
#                                a player name. Switches the material to
#                                PLAYER_HEAD automatically.
#   enchantments               - { id: level } map
#   custom_model_data          - floats / flags / strings / colors lists
#   item_model                 - Resource location (e.g. namespace:path)
#   potion_contents.custom_color - Integer RGB
#   tooltip_display            - hide_tooltip + hidden_components list
#   tooltip_style              - Resource location
#   enchantment_glint_override - true / false
#
# Skins (skins.yml) only support the visual subset:
# item_model, name, lore, tooltip_style, tooltip_display, custom_model_data.
# See skins.yml for details.

config-version: 1

# Language file to use from the lang/ folder (without .yml)
# Available: en_US, es_ES (or create your own)
lang: 'en_US'

defaults:
  # Maximum number of skin slots a single item can hold.
  max-slots: 6

# Behaviour of the skin switch action (menu, /ss switch, etc.)
switch:
  # 'actionbar' shows the message above the hotbar.
  # 'chat' falls back to a regular chat message.
  feedback: 'actionbar'

  sound:
    enabled: true
    key: 'minecraft:ui.button.click'
    volume: 1.0
    pitch: 1.2

# Played to the player when a skin or tooltip token is consumed onto an
# item (right-click in the inventory).
tokens:
  sound:
    enabled: true
    key: 'minecraft:entity.experience_orb.pickup'
    volume: 1.0
    pitch: 1.4

# Skin selection menu (/ss menu).
# The layout uses single-character symbols. Each character maps to a role:
#   skin-slot.symbol      -> one slot per character; page size = nº of S
#   vanilla-button.symbol -> reverts the held item to its original look
#   close-button.symbol   -> closes the menu
#   prev-button.symbol    -> previous page (auto-hidden on the first page)
#   next-button.symbol    -> next page     (auto-hidden on the last page)
#   any other character   -> looked up in decorative-icons
#
# Pagination: total pages = ceil(item-skin-count / nº of S). The prev/next
# icons accept {page} and {pages} placeholders.
menu:
  title: '<white><gradient:#B4E488:#7DD031><b>Switch Skin</b></gradient></white>'
  layout:
    - 'XXXXXXXXX'
    - 'XSSSSSSSX'
    - 'PVXXXXXCN'

  # Symbol from decorative-icons used to fill the prev/next button slots
  # when the button is hidden (page 0 has no prev, last page has no next).
  # Set to '' to keep those slots empty.
  fill-empty: 'X'

  # The skin entries always use the held item's material (a pickaxe menu
  # shows pickaxes, a sword menu shows swords, ...). Defining `material`
  # under entry-active / entry-inactive has no effect.
  skin-slot:
    symbol: 'S'
    entry-active:
      custom_name: '<gradient:#B4E488:#7DD031><b>{skin}</b></gradient>'
      lore:
        - ''
        - ' <#B4E488>► Active skin</#B4E488> '
        - ''
      tooltip_display:
        hidden_components:
          - 'attribute_modifiers'
    entry-inactive:
      custom_name: '<white>{skin}</white>'
      lore:
        - ''
        - ' <gray>Click to switch to this skin.</gray> '
        - ''
      tooltip_display:
        hidden_components:
          - 'attribute_modifiers'

  # The vanilla button also inherits the held item's material so the
  # player sees a preview of what their item will look like once the
  # skin is removed. `material` here has no effect.
  vanilla-button:
    symbol: 'V'
    active:
      custom_name: '<red><b>Vanilla</b></red> <gray>(active)</gray>'
      lore:
        - ''
        - ' <gray>The original look is showing.</gray> '
        - ' <gray>Click any skin to reapply it.</gray> '
        - ''
    inactive:
      custom_name: '<red><b>Vanilla</b></red>'
      lore:
        - ''
        - ' <gray>Restore the original look</gray> '
        - ' <gray>without losing your tokens.</gray> '
        - ''

  close-button:
    symbol: 'C'
    material: 'OAK_DOOR'
    custom_name: '<red><b>Close</b></red>'
    lore:
      - ''
      - ' <gray>Closes this menu.</gray> '
      - ''

  prev-button:
    symbol: 'P'
    material: 'ARROW'
    custom_name: '<white>« Previous</white> <gray>({page}/{pages})</gray>'
    lore:
      - ''
      - ' <gray>Go to the previous page.</gray> '
      - ''

  next-button:
    symbol: 'N'
    material: 'ARROW'
    custom_name: '<white>Next »</white> <gray>({page}/{pages})</gray>'
    lore:
      - ''
      - ' <gray>Go to the next page.</gray> '
      - ''

  decorative-icons:
    border:
      symbol: 'X'
      material: 'GRAY_STAINED_GLASS_PANE'
      custom_name: ' '

# Token item used to add a skin slot to a held item.
# {skin} is replaced by the linked skin's display name.
# Accepts the full data-component set from the header.
token:
  material: 'NAME_TAG'
  custom_name: '<gradient:#B4E488:#7DD031><b>Skin Slot Token</b></gradient> <gray>—</gray> <white>{skin}</white>'
  lore:
    - ''
    - ' <white>Right-click this token onto an</white> '
    - ' <white>item in your inventory to add</white> '
    - ' <white>the <#7DD031>{skin}</#7DD031> skin slot.</white> '
    - ''
  tooltip_display:
    hidden_components:
      - 'attribute_modifiers'

# Tooltip token: applies a skin's tooltip_style without touching the slot row.
# Same data-component support as `token`.
tooltip-token:
  material: 'PAPER'
  custom_name: '<gradient:#B4E488:#7DD031><b>Tooltip Token</b></gradient> <gray>—</gray> <white>{skin}</white>'
  lore:
    - ''
    - ' <white>Right-click this token onto an</white> '
    - ' <white>item in your inventory to apply</white> '
    - ' <white>the <#7DD031>{skin}</#7DD031> tooltip style.</white> '
    - ''
  tooltip_display:
    hidden_components:
      - 'attribute_modifiers'
