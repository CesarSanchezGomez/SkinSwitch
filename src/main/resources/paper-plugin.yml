name: SwitchSkin
version: '1.0.0'
authors:
  - CesarCosmico
main: com.cesarcosmico.switchskin.SwitchSkinPlugin
description: Add skin slots to in-hand items and switch between custom item models.
api-version: '1.21'

dependencies:
  server:
    PlaceholderAPI:
      load: BEFORE
      required: false
      join-classpath: true

permissions:
  switchskin.*:
    description: Full access to SwitchSkin
    default: op
    children:
      switchskin.use: true
      switchskin.admin: true

  switchskin.admin:
    description: Allows reloading the config and managing skin slots/tokens
    default: op

  switchskin.use:
    description: Allows switching skins on items that already have slots
    default: true
