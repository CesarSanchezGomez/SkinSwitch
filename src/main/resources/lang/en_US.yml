# SkinSwitch - English Language File (US)
# Supports MiniMessage formatting.
# Use {prefix} to insert the plugin prefix.
# Internal version — do not edit. Bump = new messages were added.
config-version: 1

prefix: '<white>[<gradient:#C173FF:#950DFF>SkinSwitch</gradient>]</white>'

# -- Commands ---------------------------------
command:
  only-players: '{prefix} <red>This command can only be used by players.</red>'
  no-permission: '{prefix} <white>You don''t have permission to do that.</white>'
  reload-success: '{prefix} <white>Configuration reloaded successfully.</white>'
  no-item-in-hand: '{prefix} <red>You must hold an item in your main hand.</red>'
  unknown-skin: '{prefix} <red>Unknown skin: <white>{skin}</white>.</red>'
  slot-added: '{prefix} <white>Slot <#C173FF>{skin}</#C173FF> added. Total: <#C173FF>{count}</#C173FF>.</white>'
  slot-removed: '{prefix} <white>Slot <#C173FF>{skin}</#C173FF> removed.</white>'
  invalid-slot: '{prefix} <red>Invalid slot index.</red>'
  no-slots: '{prefix} <white>This item has no skin slots.</white>'
  slots-full: '{prefix} <white>This item has reached the maximum slot capacity ({max}).</white>'
  duplicate-slot: '{prefix} <white>That skin is already installed on this item.</white>'
  token-given: '{prefix} <white>Gave <#C173FF>{count}</#C173FF> token(s) of <#C173FF>{skin}</#C173FF> to <#C173FF>{player}</#C173FF>.</white>'
  tooltip-token-given: '{prefix} <white>Gave <#C173FF>{count}</#C173FF> tooltip token(s) of <#C173FF>{skin}</#C173FF> to <#C173FF>{player}</#C173FF>.</white>'
  tooltip-applied: '{prefix} <white>Tooltip <#C173FF>{skin}</#C173FF> applied.</white>'
  tooltip-removed: '{prefix} <white>Tooltip removed from the active slot.</white>'
  tooltip-not-applied: '{prefix} <white>The active slot has no tooltip applied.</white>'
  tooltip-missing: '{prefix} <red>Skin <white>{skin}</white> has no tooltip_style defined.</red>'
  tooltip-needs-slot: '{prefix} <red>You must add the <white>{skin}</white> skin slot before applying its tooltip.</red>'
  tooltip-duplicate: '{prefix} <white>The <#C173FF>{skin}</#C173FF> tooltip is already applied.</white>'
  player-not-found: '{prefix} <red>Player not found: <white>{player}</white>.</red>'

# -- Skin switching ---------------------------
skin:
  switched: '{prefix} <white>Switched to <#C173FF>{skin}</#C173FF>.</white>'

# -- Slot row layout ---------------------------
# The slot row is built as:
#   prefix + slot[0] + separator + slot[1] + ... + suffix
# Each slot uses slot-active or slot-inactive depending on whether it's
# the currently selected one. Edit prefix/separator/suffix to control
# the spacing independently — adding a space to slot-active alone would
# double up between slots, which is why the padding is split out here.
#
# Vertical layout (around the row):
#   position      'above' or 'below' the item's original lore.
#   lines-before  list of MiniMessage lines inserted BEFORE the row.
#                 Defaults to []. Use [''] for one blank line, etc.
#   lines-after   list of MiniMessage lines inserted AFTER the row.
#
# Templates ({color} and {icon} are placeholders):
#   slot-active   how the active slot is rendered.
#   slot-inactive how every other slot is rendered.
#
# Placeholders:
#   {color}  bracket colour — resolved per slot from skins.yml:
#            bracket-color when the slot's tooltip token is applied,
#            bracket-color-default otherwise. Each falls back to the
#            global default-bracket-color when not defined.
#   {icon}   the icon glyph for that slot. The skin's icon-active /
#            icon-inactive (when defined) own the styling per state;
#            otherwise the plain `icon` field is used. If you want
#            different colours per state and your skin doesn't use
#            those overrides, just hardcode the colour around {icon}
#            in the template (e.g. <white>{icon}</white>).
lore:
  position: 'below'
  lines-before: []
  lines-after: []
  prefix: ' '
  separator: ' '
  suffix: ' '
  slot-active: '<color:{color}>[</color>{icon}<color:{color}>]</color>'
  slot-inactive: '<color:{color}>[</color>{icon}<color:{color}>]</color>'
