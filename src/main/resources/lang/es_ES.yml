# SwitchSkin - Archivo de idioma en Español (España)
config-version: 1

prefix: '<white>[<gradient:#B4E488:#7DD031>SwitchSkin</gradient>]</white>'

# -- Comandos ---------------------------------
command:
  only-players: '{prefix} <red>Este comando solo puede ser usado por jugadores.</red>'
  no-permission: '{prefix} <white>No tienes permiso para hacer eso.</white>'
  reload-success: '{prefix} <white>Configuración recargada exitosamente.</white>'
  no-item-in-hand: '{prefix} <red>Debes tener un ítem en la mano principal.</red>'
  unknown-skin: '{prefix} <red>Skin desconocida: <white>{skin}</white>.</red>'
  slot-added: '{prefix} <white>Slot <#7DD031>{skin}</#7DD031> añadido. Total: <#7DD031>{count}</#7DD031>.</white>'
  slot-removed: '{prefix} <white>Slot <#7DD031>{skin}</#7DD031> eliminado.</white>'
  invalid-slot: '{prefix} <red>Índice de slot inválido.</red>'
  no-slots: '{prefix} <white>Este ítem no tiene slots de skin.</white>'
  slots-full: '{prefix} <white>Este ítem ha alcanzado el límite de slots ({max}).</white>'
  duplicate-slot: '{prefix} <white>Esta skin ya está instalada en este ítem.</white>'
  token-given: '{prefix} <white>Entregaste <#7DD031>{count}</#7DD031> token(s) de <#7DD031>{skin}</#7DD031> a <#7DD031>{player}</#7DD031>.</white>'
  tooltip-token-given: '{prefix} <white>Entregaste <#7DD031>{count}</#7DD031> token(s) de tooltip <#7DD031>{skin}</#7DD031> a <#7DD031>{player}</#7DD031>.</white>'
  tooltip-applied: '{prefix} <white>Tooltip <#7DD031>{skin}</#7DD031> aplicado.</white>'
  tooltip-removed: '{prefix} <white>Tooltip eliminado del slot activo.</white>'
  tooltip-not-applied: '{prefix} <white>El slot activo no tiene tooltip aplicado.</white>'
  tooltip-missing: '{prefix} <red>La skin <white>{skin}</white> no tiene tooltip_style definido.</red>'
  tooltip-needs-slot: '{prefix} <red>Debes añadir primero el slot de skin <white>{skin}</white> antes de aplicar su tooltip.</red>'
  tooltip-duplicate: '{prefix} <white>El tooltip de <#7DD031>{skin}</#7DD031> ya está aplicado.</white>'
  player-not-found: '{prefix} <red>Jugador no encontrado: <white>{player}</white>.</red>'
  cooldown: '{prefix} <white>Espera <#7DD031>{seconds}s</#7DD031> antes de cambiar de nuevo.</white>'
  single-slot: '{prefix} <white>Este ítem solo tiene un slot de skin.</white>'
  already-active: '{prefix} <white>La skin <#7DD031>{skin}</#7DD031> ya está activa.</white>'
  already-vanilla: '{prefix} <white>El ítem ya está mostrando su aspecto vanilla.</white>'
  skin-not-on-item: '{prefix} <red>La skin <white>{skin}</white> no está instalada en este ítem.</red>'

# -- Cambio de skin ---------------------------
skin:
  switched: '<white>Cambiaste a <gradient:#B4E488:#7DD031>{skin}</gradient></white>'
  switched-vanilla: '<white>Restaurado el aspecto <red>vanilla</red></white>'

# -- Layout de la fila de slots ----------------
lore:
  position: 'below'
  lines-before: []
  lines-after: []
  prefix: ' '
  separator: ' '
  suffix: ' '
  slot-active: '<color:{color}>[</color>{icon}<color:{color}>]</color>'
  slot-inactive: '<color:{color}>[</color>{icon}<color:{color}>]</color>'
