# SkinSwitch - Archivo de idioma en Español (España)
# Soporta formato MiniMessage.
# Usa {prefix} para insertar el prefijo del plugin.
# Versión interna — no editar. Cambio = nuevos mensajes añadidos.
config-version: 1

prefix: '<white>[<gradient:#C173FF:#950DFF>SkinSwitch</gradient>]</white>'

# -- Comandos ---------------------------------
command:
  only-players: '{prefix} <red>Este comando solo puede ser usado por jugadores.</red>'
  no-permission: '{prefix} <white>No tienes permiso para hacer eso.</white>'
  reload-success: '{prefix} <white>Configuración recargada exitosamente.</white>'
  no-item-in-hand: '{prefix} <red>Debes tener un ítem en la mano principal.</red>'
  unknown-skin: '{prefix} <red>Skin desconocida: <white>{skin}</white>.</red>'
  slot-added: '{prefix} <white>Slot <#C173FF>{skin}</#C173FF> añadido. Total: <#C173FF>{count}</#C173FF>.</white>'
  slot-removed: '{prefix} <white>Slot <#C173FF>{skin}</#C173FF> eliminado.</white>'
  invalid-slot: '{prefix} <red>Índice de slot inválido.</red>'
  no-slots: '{prefix} <white>Este ítem no tiene slots de skin.</white>'
  slots-full: '{prefix} <white>Este ítem ha alcanzado el límite de slots ({max}).</white>'
  duplicate-slot: '{prefix} <white>Esta skin ya está instalada en este ítem.</white>'
  token-given: '{prefix} <white>Entregaste <#C173FF>{count}</#C173FF> token(s) de <#C173FF>{skin}</#C173FF> a <#C173FF>{player}</#C173FF>.</white>'
  tooltip-token-given: '{prefix} <white>Entregaste <#C173FF>{count}</#C173FF> token(s) de tooltip <#C173FF>{skin}</#C173FF> a <#C173FF>{player}</#C173FF>.</white>'
  tooltip-applied: '{prefix} <white>Tooltip <#C173FF>{skin}</#C173FF> aplicado.</white>'
  tooltip-removed: '{prefix} <white>Tooltip eliminado del slot activo.</white>'
  tooltip-not-applied: '{prefix} <white>El slot activo no tiene tooltip aplicado.</white>'
  tooltip-missing: '{prefix} <red>La skin <white>{skin}</white> no tiene tooltip_style definido.</red>'
  tooltip-needs-slot: '{prefix} <red>Debes añadir primero el slot de skin <white>{skin}</white> antes de aplicar su tooltip.</red>'
  tooltip-duplicate: '{prefix} <white>El tooltip de <#C173FF>{skin}</#C173FF> ya está aplicado.</white>'
  player-not-found: '{prefix} <red>Jugador no encontrado: <white>{player}</white>.</red>'

# -- Cambio de skin ---------------------------
skin:
  switched: '{prefix} <white>Cambiaste a <#C173FF>{skin}</#C173FF>.</white>'

# -- Layout de la fila de slots ----------------
# La fila se construye como:
#   prefix + slot[0] + separator + slot[1] + ... + suffix
# Cada slot usa slot-active o slot-inactive según sea o no el activo.
# Edita prefix/separator/suffix para controlar el espaciado por separado
# — meter un espacio dentro de slot-active duplicaría el espacio entre
# slots, por eso el padding está separado aquí.
#
# Posicionamiento vertical (alrededor de la fila):
#   position      'above' (encima) o 'below' (debajo) del lore original.
#   lines-before  lista de líneas MiniMessage ANTES de la fila.
#                 Por defecto []. Usa [''] para una línea en blanco, etc.
#   lines-after   lista de líneas MiniMessage DESPUÉS de la fila.
#
# Plantillas ({color} y {icon} son placeholders):
#   slot-active   cómo se renderiza el slot activo.
#   slot-inactive cómo se renderizan los demás slots.
#   Las plantillas por defecto envuelven SOLO los corchetes en {color}
#   para que el icono no se tinte con el color de los corchetes.
lore:
  position: 'below'
  lines-before: []
  lines-after: []
  prefix: ' '
  separator: ' '
  suffix: ' '
  slot-active: '<color:{color}>[</color><white><b>{icon}</b></white><color:{color}>]</color>'
  slot-inactive: '<color:{color}>[</color><white>{icon}</white><color:{color}>]</color>'
