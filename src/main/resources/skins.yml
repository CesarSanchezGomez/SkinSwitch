# =============================================
#                  SwitchSkin Skins
# =============================================
# Each entry maps a skin id -> set of overrides applied when that slot
# is the active one.
#
# Two formats are accepted (mixable):
#
#   flat (item_model only):
#     summer_skin: edosummer:ice_cream_pickaxe
#
#   section (recommended):
#     summer_skin:
#       item_model:             edosummer:ice_cream_pickaxe                  # optional (visual model swap)
#       name:                   '<#FCBDE3>Summer Pickaxe</#FCBDE3>'           # custom_name when active
#       lore:                                                                 # lore shown when active
#         - '<gray>Sun-soaked.</gray>'
#       icon-active:            '<gradient:#FFB347:#FFCC33>⊰ 🍦 ⊱</gradient>'  # slot-row glyph when active
#       icon-inactive:          '<white>⊰ 🍦 ⊱</white>'                        # slot-row glyph when inactive (falls back to icon-active, then to default-icon-*)
#       bracket-color-active:   '#FCBDE3'                                     # bracket colour when this slot is active
#       bracket-color-inactive: '#888888'                                     # bracket colour when this slot is in the row but not active
#       tooltip_style:          'minecraft:summer'                            # only applied via tooltip token
#
# All fields are optional. A skin with only custom_model_data, lore,
# tooltip_style or any subset is valid. Behavior:
#   * 'item_model'           when present, swaps the model while this slot
#                            is active. The item's original item_model is
#                            captured on the first slot add and restored
#                            when the last slot is removed.
#   * 'name'                 when present, replaces the item's custom_name
#                            while this slot is active. Omit it to keep
#                            the item's vanilla name.
#   * 'lore'                 when present, replaces the item's lore while
#                            this slot is active. Omit it to keep the
#                            item's vanilla lore. The slot row is always
#                            rendered as the first lore line on top of
#                            whatever lore is shown.
#   * 'icon-active'          slot-row glyph used when this skin is the
#                            active one. Falls back to default-icon-active,
#                            then to the skin id. Keep it as a plain
#                            character if you want lang templates to drive
#                            its colour; colour tags inside the icon
#                            always win against any outer wrapper.
#   * 'icon-inactive'        slot-row glyph used when this skin is in the
#                            row but not active. Falls back to icon-active,
#                            then to default-icon-inactive.
#   * 'bracket-color-active'   bracket colour while this slot is the active
#                              one. Falls back to default-bracket-color-active.
#   * 'bracket-color-inactive' bracket colour while this slot is in the row
#                              but not active. Falls back to
#                              default-bracket-color-inactive.
#   * 'tooltip_style'        is NOT applied by the skin slot. Each slot has
#                            its own tooltip flag — give the player a
#                            tooltip token (/ss givetooltip <player> <skin>)
#                            and have them right-click it onto the target
#                            item. The skin slot must already exist on the
#                            item. Remove the active slot's tooltip with
#                            /ss removetooltip while holding the item.
#   * 'custom_model_data'    optional. Mirrors the vanilla custom_model_data
#                            data component (floats / flags / strings /
#                            colors lists). Applied when this slot is the
#                            active one; the item's original CMD is captured
#                            on the first slot add and restored when the
#                            last slot is removed (or vanilla is selected).
#                            Example:
#                              custom_model_data:
#                                floats:  [42.0]
#                                strings: ['variant_a']
#   * 'tooltip_display'      optional. Mirrors the vanilla tooltip_display
#                            data component (hide_tooltip + hidden_components
#                            list). Purely visual, so applied whenever the
#                            slot is active (no tooltip token required).
#                            The item's original tooltip_display is captured
#                            and restored under the same rules as the CMD.
#                            Example:
#                              tooltip_display:
#                                hidden_components:
#                                  - 'attribute_modifiers'
#
# Skins are visual-only: enchants, material, profile, etc. are NOT
# accepted. Use a plugin like ItemsAdder if you need that level of
# transformation.
#
# Item data (durability, enchants, attributes, other PDC) is preserved
# when switching; only item_model + custom_name + lore + custom_model_data
# + tooltip_display + tooltip_style are touched by the skin / tooltip
# tokens. Originals are captured the first time a slot is added and
# restored the moment the last slot leaves.

# Internal version — do not edit. Bump = new keys were added.
config-version: 1

# Slot-row fallbacks. Used whenever a skin omits its own override.
# Colour values are MiniMessage colour names (gray, gold, aqua, …) or
# hex codes like '#FCBDE3'. Wrap-tags like '<gray>' are NOT accepted —
# just the value. Icons are MiniMessage strings (a single glyph or
# styled segment); leave them empty to fall through to the skin id.
default-bracket-color-active: 'gray'
default-bracket-color-inactive: 'dark_gray'
default-icon-active: '●'
default-icon-inactive: '○'

skins:
  summer_skin:
    item_model: edosummer:ice_cream_pickaxe
    name: '<#FCBDE3>Summer Pickaxe</#FCBDE3>'
    icon-active: '🍦'
    bracket-color-active: '#FCBDE3'

  autum_skin:
    item_model: edoween:bone_set/bone_pickaxe
    name: '<white>🎃</white> <gradient:#FFFFFF:#BDBDBD>MegaPico de hueso</gradient> <white>🎃</white>'
    lore:
      - ''
      - ' <white>[</white> <#FFFFFF>⊰ <#F4F4F4>🦴 <#E9E9E9>⊱ <white>] Conseguido en #R.I.P. [</white> <#DEDEDE>⊰ <#D3D3D3>🦴 <#C8C8C8>⊱ <white>]</white> '
      - ''
      - ' <gradient:#FFFFFF:#BDBDBD><b>-= EDOXMAS =-</b></gradient> <gray>Propietari@</gray><white>:</white> <gradient:#FFFFFF:#BDBDBD>%player_name%</gradient><white>.</white> '
      - ''
    icon-active: ' <gradient:#FFFFFF:#BDBDBD>⊰ 🎃 ⊱</gradient> '
    icon-inactive: ' <white>⊰ 🎃 ⊱</white> '
    bracket-color-active: '#414345'
    tooltip_style: 'minecraft:white'

  winter_skin:
    item_model: edoxmas:glacial_set/glacial_pickaxe
    name: '<white>❊</white> <gradient:#A6F6FF:#0ED2F7>MegaPico glacial</gradient> <white>❊</white>'
    lore:
      - ''
      - ' <white>[</white> <#A6F6FF>⊰ <#88EFFD>⛄ <#69E8FC>⊱ <white>] Conseguido en #Un''ED''neathTheTree [</white> <#4BE0FA>⊰ <#2CD9F9>⛄ <#0ED2F7>⊱ <white>]</white> '
      - ''
      - ' <gradient:#A6F6FF:#0ED2F7><b>-= EDOXMAS =-</b></gradient> <gray>Propietari@</gray><white>:</white> <gradient:#A6F6FF:#0ED2F7>%player_name%</gradient><white>.</white> '
      - ''
    icon-active: ' <gradient:#A6F6FF:#0ED2F7>⊰ ❊ ⊱</gradient> '
    icon-inactive: ' <white>⊰ ❊ ⊱</white> '
    bracket-color-active: '#0ED2F7'
    tooltip_style: 'minecraft:aqua'
    tooltip_display:
      hidden_components:
        - 'attribute_modifiers'
    custom_model_data:
      strings:
        - 'glacial'
